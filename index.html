<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТОО «ПРОМРЕСУРС MPGA»</title>
<link rel="icon" href="images/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">

<style>
:root{
--white:#fff;--light-gray:#e0e0e0;--gray:#c0c0c0;
--bg-light:#004080;--bg-dark:#002040;
--fs-1:60px;--fs-2:45px;--fs-3:30px;--fs-4:22.5px;--fs-5:15px;
}

*{box-sizing:border-box}
body{margin:0;font-family:'Ubuntu Condensed',sans-serif}
a{text-decoration:none;color:inherit}
.click{cursor:pointer;transition:.25s}

.header{background:var(--bg-light);color:#fff;display:flex;justify-content:space-between;align-items:center;padding:calc(var(--fs-1)/8)}
.header-left{margin-left:calc(var(--fs-1)/4);cursor:pointer}
.header-left:hover{color:var(--bg-dark)}
.title{font-size:var(--fs-1);font-weight:bold}
.subtitle{font-size:var(--fs-3);color:var(--gray);margin-top:calc(var(--fs-3)/8)}
.header-right{display:flex;align-items:center;gap:calc(var(--fs-3)/2);font-size:var(--fs-3)}
.header-right .click:hover{color:var(--bg-dark)}

.lang{position:relative}
.lang-box{display:none;position:absolute;right:0;background:#fff;border:1px solid var(--bg-dark);width:100%}
.lang-item{padding:calc(var(--fs-5));text-align:center;color:var(--bg-light)}
.lang-item.active{background:var(--bg-dark);color:var(--gray);pointer-events:none}
.lang-item:hover:not(.active){background:var(--bg-light);color:#fff}

.hero{height:75vh;overflow:hidden}
.hero img{width:100%;height:120%;object-fit:cover}

.section-inner{max-width:75%;margin:0 auto;padding:calc(var(--fs-1)/2) 0;text-align:center}
.title-big{font-size:var(--fs-1);font-weight:bold;margin-bottom:calc(var(--fs-1)/4)}
.text{font-size:var(--fs-3);margin-top:calc(var(--fs-2)/4);line-height:1.6}

.table{width:100%;border-collapse:collapse;margin-top:calc(var(--fs-3)/2)}
.table th,.table td{border:calc(var(--fs-3)/8) solid;padding:calc(var(--fs-5));text-align:center;background:#fff}
.table th{font-size:var(--fs-3);font-weight:normal}
.table td{font-size:var(--fs-4)}

.row{display:flex;flex-wrap:wrap;justify-content:center;gap:calc(var(--fs-3))}
.img{width:150px;height:150px;background:var(--gray)}

.partners{display:flex;flex-wrap:wrap;gap:calc(var(--fs-3));justify-content:center}
.partner-img{max-height:100px}

.advantages-list{margin-top:calc(var(--fs-3))}
.adv-item{font-size:var(--fs-3);padding:calc(var(--fs-4)/2) 0;border-top:calc(var(--fs-2)/32) solid var(--bg-light)}
.adv-item:last-child{border-bottom:calc(var(--fs-2)/32) solid var(--bg-light)}

.contacts-bg{background:var(--bg-light)}
.contacts-inner{max-width:75%;margin:0 auto;display:flex;gap:calc(var(--fs-2));padding:calc(var(--fs-1)/2) 0}
.contacts-left{color:var(--light-gray);font-size:var(--fs-3)}
.contacts-title{font-size:var(--fs-1);color:#fff;font-weight:bold}
.contacts-left .click:hover{color:var(--bg-dark)}

.footer{background:var(--bg-dark);color:#fff;display:flex;justify-content:space-between;padding:calc(var(--fs-3)/2)}
.footer-left{cursor:pointer}
.footer-left:hover{color:var(--bg-light)}
.footer-title{font-size:var(--fs-2);font-weight:bold}
.footer-sub{color:var(--gray);font-size:var(--fs-3)}
.footer-right{font-size:var(--fs-4);color:var(--light-gray)}
.footer-right div{margin-top:calc(var(--fs-4)/2)}
.footer-right div:hover{color:var(--bg-light)}
</style>
</head>

<body>

<div class="header">
<div class="header-left" onclick="scrollToTop()">
<div class="title" id="title"></div>
<div class="subtitle" id="subtitle"></div>
</div>
<div class="header-right">
<span>📞</span><div class="click" id="phone"></div>
<span>✉️</span><div class="click" id="email"></div>
<span>🌐</span>
<div class="lang click" onclick="toggleLang()">
<span id="currentLang">РУС</span> <span id="arrow">▾</span>
<div class="lang-box" id="langBox"></div>
</div>
</div>
</div>

<div class="hero"><img src="images/banner.png"></div>
<div id="content"></div>

<div class="contacts-bg">
<div class="contacts-inner">
<div class="contacts-left" id="contacts"></div>
<iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d1802.6446466229613!2d57.21934396505706!3d50.285870110080076" width="600" height="600" style="border:0;"></iframe>
</div>
</div>

<div class="footer">
<div class="footer-left" onclick="scrollToTop()">
<div class="footer-title" id="footerTitle"></div>
<div class="footer-sub" id="footerSub"></div>
</div>
<div class="footer-right" id="footerRight"></div>
</div>

<script>
const phoneFormatted='+7 (775) 331-64-44';

const partners=['agakim','asahiKasei','cardolite','covestro','croda','evonik','kraton','roehm','unger','vandeputte','wanhua','zschimmerAndSchwarz'];

const DATA={
ru:{
title:'ТОО «ПРОМРЕСУРС MPGA»',subtitle:'Производственно-торговая компания',
aboutTitle:'О НАС',produceTitle:'МЫ ПРОИЗВОДИМ',productsTitle:'НАШИ ТОВАРЫ',supplyTitle:'МЫ ПОСТАВЛЯЕМ',partnersTitle:'НАШИ ПАРТНЁРЫ',advantagesTitle:'НАШИ ПРЕИМУЩЕСТВА',contactsTitle:'КОНТАКТЫ',
about:`<b>ТОО «ПРОМРЕСУРС MPGA»</b> — производственно-торговая компания, основанная в 2017 году в городе Актобе, Республике Казахстан.<br><br>Компания специализируется на производстве лакокрасочной продукции и строительных материалов, а также на поставке химических компонентов для различных отраслей промышленности.<br><br>Предприятие располагает собственными производственными мощностями и современным оборудованием, что позволяет выпускать широкий ассортимент продукции и поддерживать стабильное качество.<br><br>Одним из ключевых принципов работы компании является строгое соблюдение технологических норм производства, использование сырья от проверенных и надежных поставщиков, а также постоянное совершенствование производственных процессов.<br><br>Благодаря развитию производственной базы и расширению технологических возможностей компания планирует увеличить ассортимент выпускаемой продукции до 500 наименований.`,
produce:`<b>ТОО «ПРОМРЕСУРС MPGA»</b> производит широкий спектр лакокрасочной и строительной продукции, используемой в строительстве, ремонте и промышленности.<br><br>Ассортимент выпускаемой продукции включает несколько основных направлений.`,
supply:`<b>ТОО «ПРОМРЕСУРС MPGA»</b> также занимается поставкой химических компонентов для предприятий химической промышленности и производственных компаний.<br><br>Компания обеспечивает стабильные поставки продукции, высокое качество материалов и профессиональную техническую поддержку для своих клиентов.<br><br>Закупка химического сырья осуществляется напрямую у заводов-изготовителей или у официальных дистрибьюторов, что гарантирует надежность и соответствие продукции установленным стандартам.<br><br>В ассортименте поставляемой продукции представлены только проверенные химические компоненты, соответствующие международным требованиям качества.`,
headers1:['Краски','Материалы','Покрытия'],
cols1:[['Дорожные','Интерьерные','Моющиеся','Потолочные','Универсальные'],['Герметики','Шпатлевки','Наливные полы'],['Бетоноконтакт','Грунтовки','Лаки']],
headers2:['Смолы','Растворители','Пигменты','Добавки','Отвердители и Катализаторы'],
cols2:[['Акриловые','Алкидные','Виниловые','Полиуретановые','Силиконовые','Эпоксидные'],['Ароматические углеводороды','Вода','Жиры','Кетоны','Масла','Эфиры'],['Антикоррозионные','Минеральные','Неорганические','Органические'],['Адгезионные','Биологические','Диспергирующие','Пенообразующие','Реологические','Функциональные'],['Амины','Изоцианаты','Металлические сиккативы','Пероксиды']],
advantages:['Прямые контракты с производителями','Гарантированное качество поставляемых химических компонентов','Собственные складские мощности','Гибкие условия сотрудничества','Различные виды упаковки и фасовки','Техническая консультация и поддержка','Индивидуальный подход к каждому клиенту','Многоуровневая система контроля качества продукции']
},

kz:{
title:'«ПРОМРЕСУРС MPGA» ЖШС',subtitle:'Өндірістік-сауда компаниясы',
aboutTitle:'БІЗ ТУРАЛЫ',produceTitle:'БІЗ ӨНДІРЕМІЗ',productsTitle:'БІЗДІҢ ӨНІМДЕР',supplyTitle:'БІЗ ЖЕТКІЗЕМІЗ',partnersTitle:'БІЗДІҢ СЕРІКТЕСТЕР',advantagesTitle:'АРТЫҚШЫЛЫҚТАРЫМЫЗ',contactsTitle:'БАЙЛАНЫС',
about:`<b>«ПРОМРЕСУРС MPGA» ЖШС</b> — 2017 жылы Ақтөбе қаласында құрылған өндірістік-сауда компаниясы.<br><br>Компания лак-бояу өнімдері мен құрылыс материалдарын өндіруге, сондай-ақ химиялық компоненттерді жеткізуге маманданған.<br><br>Компания заманауи жабдықтары бар өндірістік қуаттарға ие және өнім сапасын тұрақты сақтайды.<br><br>Негізгі қағидалардың бірі — технологияларды сақтау, сенімді шикізат қолдану және өндірісті жетілдіру.<br><br>Компания өнім ассортиментін 500 атауға дейін кеңейтуді жоспарлап отыр.`,
produce:`<b>«ПРОМРЕСУРС MPGA» ЖШС</b> құрылыс пен өнеркәсіпке арналған лак-бояу және құрылыс материалдарын өндіреді.<br><br>Ассортимент бірнеше негізгі бағыттан тұрады.`,
supply:`<b>«ПРОМРЕСУРС MPGA» ЖШС</b> химиялық компоненттерді де жеткізеді.<br><br>Компания сапа мен тұрақты жеткізуді қамтамасыз етеді.<br><br>Шикізат тікелей өндірушілерден алынады.<br><br>Барлық өнімдер халықаралық стандарттарға сәйкес келеді.`,
headers1:['Бояулар','Материалдар','Қаптамалар'],
cols1:[['Жол','Ішкі','Жууға болатын','Төбе','Әмбебап'],['Герметик','Шпатлевка','Еден'],['Бетонконтакт','Грунт','Лак']],
headers2:['Шайырлар','Еріткіштер','Пигменттер','Қоспалар','Қатайтқыштар'],
cols2:[['Акрил','Алкид','Винил','Полиуретан','Силикон','Эпоксид'],['Көмірсутектер','Су','Майлар','Кетондар','Майлар','Эфирлер'],['Антикоррозия','Минерал','Бейорганик','Органик'],['Адгезия','Био','Дисперсия','Көбік','Реология','Функционал'],['Аминдер','Изоцианаттар','Металл','Пероксид']],
advantages:['Тікелей келісімшарттар','Сапа кепілдігі','Қоймалар','Икемділік','Қаптама','Кеңес','Жеке тәсіл','Сапа бақылауы']
},

en:{
title:'PROMRESURS MPGA LLP',subtitle:'Manufacturing and trading company',
aboutTitle:'ABOUT US',produceTitle:'WE PRODUCE',productsTitle:'OUR PRODUCTS',supplyTitle:'WE SUPPLY',partnersTitle:'OUR PARTNERS',advantagesTitle:'OUR ADVANTAGES',contactsTitle:'CONTACTS',
about:`<b>PROMRESURS MPGA LLP</b> is a manufacturing and trading company founded in 2017 in Aktobe, Kazakhstan.<br><br>The company specializes in paints, coatings, construction materials and chemical supplies.<br><br>It has modern production facilities ensuring stable quality.<br><br>Main principles include strict technology compliance and reliable suppliers.<br><br>The company plans to expand its range up to 500 items.`,
produce:`<b>PROMRESURS MPGA LLP</b> produces a wide range of paints and construction materials.<br><br>The product range includes several key categories.`,
supply:`<b>PROMRESURS MPGA LLP</b> supplies chemical components for industrial companies.<br><br>The company ensures quality and stable delivery.<br><br>Raw materials come from manufacturers.<br><br>All products meet international standards.`,
headers1:['Paints','Materials','Coatings'],
cols1:[['Road','Interior','Washable','Ceiling','Universal'],['Sealants','Putty','Floors'],['Concrete contact','Primers','Varnish']],
headers2:['Resins','Solvents','Pigments','Additives','Hardeners'],
cols2:[['Acrylic','Alkyd','Vinyl','Polyurethane','Silicone','Epoxy'],['Hydrocarbons','Water','Fats','Ketones','Oils','Esters'],['Anti-corrosion','Mineral','Inorganic','Organic'],['Adhesion','Bio','Dispersing','Foaming','Rheology','Functional'],['Amines','Isocyanates','Metal','Peroxides']],
advantages:['Direct contracts','Quality guarantee','Warehouses','Flexibility','Packaging','Support','Individual approach','Quality control']
}
};

let lang='ru';

function render(){
let d=DATA[lang];

title.innerHTML=d.title;
subtitle.innerHTML=d.subtitle;
phone.innerHTML=`<a href='tel:+77753316444'>${phoneFormatted}</a>`;
email.innerHTML=`<a href='mailto:promresurs-mpga@outlook.com'>promresurs-mpga@outlook.com</a>`;

content.innerHTML=`
<div class='section-inner' style='color:var(--bg-light)'><div class='title-big'>${d.aboutTitle}</div><div class='text'>${d.about}</div></div>
<div class='section-inner' style='background:var(--bg-light);color:#fff'><div class='title-big'>${d.produceTitle}</div><div class='text'>${d.produce}</div><table class='table'>${renderTable(d.headers1,d.cols1)}</table></div>
<div class='section-inner' style='color:var(--bg-light)'><div class='title-big'>${d.productsTitle}</div><div class='row'><div class='img'></div><div class='img'></div></div></div>
<div class='section-inner' style='background:var(--bg-dark);color:#fff'><div class='title-big'>${d.supplyTitle}</div><div class='text'>${d.supply}</div><table class='table'>${renderTable(d.headers2,d.cols2)}</table></div>
<div class='section-inner' style='color:var(--bg-light)'><div class='title-big'>${d.partnersTitle}</div>${renderPartners()}</div>
<div class='section-inner' style='color:var(--bg-light)'><div class='title-big'>${d.advantagesTitle}</div><div class='advantages-list'>${d.advantages.map(a=>`<div class='adv-item'>${a}</div>`).join('')}</div></div>
`;

contacts.innerHTML=`<div class='contacts-title'>${d.contactsTitle}</div>
<div class='click'>📞 <a href='tel:+77753316444'>${phoneFormatted}</a></div>
<div class='click'>✉️ <a href='mailto:promresurs-mpga@outlook.com'>promresurs-mpga@outlook.com</a></div>
<div class='click'>📍 <a href='https://maps.google.com/?q=50.285870,57.219343'>Актобе</a></div>`;

footerTitle.innerHTML=d.title;
footerSub.innerHTML=d.subtitle;
footerRight.innerHTML=`<div>📞 ${phoneFormatted}</div><div>✉️ promresurs-mpga@outlook.com</div><div>📍 Актобе</div>`;

renderLang();
}

function renderPartners(){
return `<div class='partners'>${partners.sort().map(p=>`<img class='partner-img' src='images/partners/partner_${p}.png'>`).join('')}</div>`;
}

function renderTable(h,c){let html='<tr>';h.forEach(x=>html+=`<th>${x}</th>`);html+='</tr>';let m=Math.max(...c.map(a=>a.length));for(let i=0;i<m;i++){html+='<tr>';c.forEach(a=>html+=`<td>${a[i]||''}</td>`);html+='</tr>';}return html}

function renderLang(){
langBox.innerHTML='';
['ru','kz','en'].forEach(l=>{
let div=document.createElement('div');
div.className='lang-item'+(l===lang?' active':'');
div.innerText=l==='ru'?'РУС':l==='kz'?'ҚАЗ':'ENG';
if(l!==lang) div.onclick=()=>{lang=l;currentLang.innerText=div.innerText;langBox.style.display='none';arrow.innerText='▾';render()};
langBox.appendChild(div);
});
}

function toggleLang(){
let open=langBox.style.display==='block';
langBox.style.display=open?'none':'block';
arrow.innerText=open?'▾':'▴';
}

function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'})}

render();
</script>

</body>
</html>
