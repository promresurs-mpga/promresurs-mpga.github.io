<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ТОО «ПРОМРЕСУРС MPGA»</title>
  <link rel="icon" href="images/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">

  <style>
    :root {
      --white: #ffffff;
      --light-gray: #e0e0e0;
      --gray: #c0c0c0;
      --bg-light: #004080;
      --bg-dark: #002040;
      --fs-1: 60px;
      --fs-2: 45px;
      --fs-3: 30px;
      --fs-4: 22.5px;
      --fs-5: 15px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Ubuntu Condensed', sans-serif;
      background: var(--white);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .click {
      cursor: pointer;
      transition: 0.25s;
    }

    /* Sections */
    .section {
      width: 100%;
    }

    .inner {
      max-width: 75%;
      margin: 0 auto;
      padding: calc(var(--fs-1) / 2) 0;
      text-align: center;
    }

    /* Header */
    .header {
      background: var(--bg-light);
      color: var(--white);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: calc(var(--fs-5));
    }

    .header-left {
      margin-left: calc(var(--fs-1) / 8);
      cursor: pointer;
      transition: 0.25s;
    }

    .header-left:hover,
    .header-left:hover .title,
    .header-left:hover .subtitle {
      color: var(--bg-dark);
    }

    .title {
      font-size: var(--fs-1);
      font-weight: bold;
      transition: 0.25s;
    }

    .subtitle {
      font-size: var(--fs-3);
      color: var(--gray);
      transition: 0.25s;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: calc(var(--fs-3) / 2);
      font-size: var(--fs-3);
    }

    .header-right .click:hover {
      color: var(--bg-dark);
    }

    /* Language selector */
    .lang {
      position: relative;
    }

    .lang-box {
      display: none;
      position: absolute;
      right: 0;
      background: var(--white);
      border: 1px solid var(--bg-dark);
      width: 100%;
      z-index: 10000;
    }

    .lang-item {
      padding: calc(var(--fs-5));
      text-align: center;
      color: var(--bg-light);
    }

    .lang-item.active {
      background: var(--bg-dark);
      color: var(--gray);
      pointer-events: none;
    }

    .lang-item:hover:not(.active) {
      background: var(--bg-light);
      color: var(--white);
    }

    /* Hero */
    .hero {
      height: 75vh;
      overflow: hidden;
      position: relative;
      background: var(--bg-light);
    }

    .hero img {
      width: 100%;
      height: 120%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    /* Content */
    .title-big {
      font-size: var(--fs-1);
      font-weight: bold;
      margin-bottom: calc(var(--fs-1) / 2);
    }

    .text {
      font-size: var(--fs-3);
      line-height: 1.6;
      margin-top: calc(var(--fs-2) / 2);
    }

    /* Tables */
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: calc(var(--fs-3) / 2);
    }

    .table th,
    .table td {
      border: calc(var(--fs-3) / 8) solid var(--bg-light);
      text-align: center;
      padding: calc(var(--fs-4) / 4);
    }

    .table th {
      font-size: var(--fs-3);
      background: var(--bg-dark);
      color: var(--white);
      font-weight: normal;
    }

    .table td {
      font-size: var(--fs-4);
      background: var(--white);
      color: var(--bg-dark);
    }

    .table-dark th {
      background: var(--bg-light);
      border-color: var(--bg-dark);
      color: var(--white);
    }

    .table-dark td {
      background: var(--white);
      color: var(--bg-light);
      border-color: var(--bg-dark);
    }

    /* Row and images */
    .row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: calc(var(--fs-3));
    }

    .img {
      width: calc(var(--fs-1) * 4);
      height: calc(var(--fs-1) * 4);
      background: var(--gray);
    }

    .img-label {
      margin-top: calc(var(--fs-4) / 2);
      font-size: var(--fs-3);
      color: var(--bg-light);
    }

    /* Partners */
    .partners {
      display: flex;
      flex-wrap: wrap;
      gap: calc(var(--fs-3));
      justify-content: center;
      margin-top: calc(var(--fs-1));
    }

    .partner-img {
      max-height: calc(var(--fs-4) * 2);
    }

    /* Advantages */
    .advantages-list {
      margin-top: calc(var(--fs-2));
      margin-bottom: calc(var(--fs-2) / 2);
    }

    .adv-item {
      font-size: var(--fs-3);
      font-weight: normal;
      padding: calc(var(--fs-4) / 2) 0;
      border-top: calc(var(--fs-2) / 16) solid var(--bg-light);
    }

    .adv-item:last-child {
      border-bottom: calc(var(--fs-2) / 16) solid var(--bg-light);
    }

    /* Contacts section */
    .contacts-bg {
      background: var(--bg-light);
    }

    .contacts-inner {
      max-width: 75%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: calc(var(--fs-2));
      padding: calc(var(--fs-1) / 2) 0;
    }

    .contacts-left {
      color: var(--light-gray);
      font-size: var(--fs-3);
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: calc(var(--fs-4) / 2);
    }

    .contacts-title {
      font-size: var(--fs-1);
      color: var(--white);
      font-weight: bold;
      margin-bottom: calc(var(--fs-3));
    }

    .contacts-left .click:hover {
      color: var(--bg-dark);
    }

    /* Footer */
    .footer {
      background: var(--bg-dark);
      color: var(--white);
      display: flex;
      justify-content: space-between;
      padding: calc(var(--fs-3) / 2);
    }

    .footer-left {
      cursor: pointer;
    }

    .footer-left:hover {
      color: var(--bg-light);
    }

    .footer-title {
      font-size: var(--fs-2);
      font-weight: bold;
      transition: 0.25s;
    }

    .footer-left:hover .footer-title {
      color: var(--bg-light);
    }

    .footer-left:hover .footer-sub {
      color: var(--bg-light);
    }

    .footer-sub {
      color: var(--gray);
      font-size: var(--fs-4);
      margin-top: calc(var(--fs-4) / 16);
      cursor: pointer;
      transition: 0.25s;
    }

    .footer-sub:hover {
      color: var(--bg-light);
    }

    .footer-right {
      font-size: var(--fs-4);
      color: var(--light-gray);
    }

    .footer-right div {
      margin-top: calc(var(--fs-4) / 2);
    }

    .footer-right div:hover {
      color: var(--bg-light);
    }

    /* Mobile menu */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--white);
      font-size: var(--fs-2);
      cursor: pointer;
      transition: 0.25s;
      padding: 0;
    }

    .mobile-menu-btn:hover {
      color: var(--bg-dark);
    }

    .mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--bg-dark);
      border-top: 1px solid var(--bg-light);
      width: 100%;
      flex-direction: column;
      gap: calc(var(--fs-4) / 2);
      padding: calc(var(--fs-3) / 2);
      text-align: center;
      z-index: 1000;
    }

    .mobile-menu.active {
      display: flex;
    }

    .mobile-menu-item {
      color: var(--light-gray);
      font-size: var(--fs-3);
      cursor: pointer;
      transition: 0.25s;
    }

    .mobile-menu-item:hover {
      color: var(--white);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      :root {
        --fs-1: 40px;
        --fs-2: 30px;
        --fs-3: 20px;
        --fs-4: 15px;
        --fs-5: 10px;
      }

      .inner {
        max-width: 90%;
      }

      .header {
        position: relative;
        flex-wrap: wrap;
        gap: calc(var(--fs-3) / 2);
        padding: calc(var(--fs-5) * 1.5);
      }

      .header-left {
        margin-left: 0;
        flex-basis: 100%;
        order: 1;
        text-align: center;
      }

      .header-right {
        gap: calc(var(--fs-3) / 2);
        font-size: var(--fs-4);
        order: 2;
        width: 100%;
        justify-content: center;
      }

      .header-right span {
        display: inline;
      }

      .lang {
        display: block;
      }

      .mobile-menu-btn {
        display: none;
      }

      .mobile-menu {
        display: none;
      }

      .header:has(.mobile-menu.active) .mobile-menu {
        display: none;
      }

      .contacts-inner {
        flex-direction: column;
        gap: calc(var(--fs-2));
      }

      .contacts-inner iframe {
        width: 100% !important;
        max-width: 500px;
        height: auto !important;
        min-height: 300px;
      }

      .footer {
        flex-direction: column;
        gap: calc(var(--fs-3));
      }

      .footer-right {
        text-align: left;
      }
    }

    @media (max-width: 480px) {
      :root {
        --fs-1: 28px;
        --fs-2: 21px;
        --fs-3: 14px;
        --fs-4: 10.5px;
        --fs-5: 7px;
      }

      .inner {
        max-width: 95%;
      }

      .row {
        gap: calc(var(--fs-3) / 2);
      }

      .img {
        width: calc(var(--fs-1) * 3);
        height: calc(var(--fs-1) * 3);
      }

      .hero {
        height: 50vh;
      }

      .header {
        padding: calc(var(--fs-5) * 1.2);
      }

      .title {
        font-size: var(--fs-1);
      }

      .subtitle {
        font-size: var(--fs-3);
      }

      .partners {
        gap: calc(var(--fs-3) / 2);
      }

      .partner-img {
        max-height: calc(var(--fs-4) * 1.5);
      }
    }
  </style>
</head>

  function render() {
    let d = DATA[lang];

    title.innerHTML = d.title;
    subtitle.innerHTML = d.subtitle;
    phone.innerHTML = `<a href='tel:+77753316444'>${phoneFormatted}</a>`;
    email.innerHTML = `<a href='mailto:${emailFormatted}'>${emailFormatted}</a>`;
    
    mobilePhone.innerHTML = `☏ <a href='tel:+77753316444'>${phoneFormatted}</a>`;
    mobileEmail.innerHTML = `✉ <a href='mailto:${emailFormatted}'>${emailFormatted}</a>`;
    mobileLang.textContent = currentLang.textContent;

    content.innerHTML = `
      <div class='section'><div class='inner' style='color:var(--bg-light)'><div class='title-big'>${d.aboutTitle}</div><div class='text'>${d.about}</div></div></div>
      <div class='section' style='background:var(--bg-light)'><div class='inner' style='color:var(--white)'><div class='title-big'>${d.produceTitle}</div><div class='text'>${d.produce}</div><table class='table'>${renderTable(d.headers1, d.cols1)}</table></div></div>
      <div class='section'><div class='inner' style='color:var(--bg-light)'><div class='title-big'>${d.productsTitle}</div><div class='row'>${d.productLabels.map((label, i) => `<div><div class='img' style='background: url(images/products/product_${i}.png) center / cover;'></div><div class='img-label'>${label}</div></div>`).join('')}</div></div></div>

      <div class='section'><div class='inner' style='color:var(--bg-light)'><div class='title-big'>${d.partnersTitle}</div><div class='partners'>${partners.map(p => `<img class='partner-img' src='images/partners/partner_${p}.png'>`).join('')}</div></div></div>
      <div class='section'><div class='inner' style='color:var(--bg-light)'><div class='title-big'>${d.advantagesTitle}</div><div class='advantages-list'>${d.advantages.map(a => `<div class='adv-item'>${a}</div>`).join('')}</div></div></div>

    let addr = lang === 'ru' ? addressRU : lang === 'kz' ? addressKZ : addressEN;

      <div class='contacts-title'>${d.contactsTitle}</div>

  function renderTable(h, c) {
    let html = '<tr>';
    h.forEach(x => html += `<th>${x}</th>`);
    html += '</tr>';
    let m = Math.max(...c.map(a => a.length));
    for (let i = 0; i < m; i++) {
      html += '<tr>';
      c.forEach(a => html += `<td>${a[i] || ''}</td>`);
      html += '</tr>';
    }
    return html;
  }

  function renderLang() {
    langBox.innerHTML = '';
    ['ru', 'kz', 'en'].forEach(l => {
      let div = document.createElement('div');
      div.className = 'lang-item' + (l === lang ? ' active' : '');
      div.innerText = l === 'ru' ? 'РУС' : l === 'kz' ? 'ҚАЗ' : 'ENG';
      if (l !== lang) {
        div.onclick = () => {
          lang = l;
          currentLang.innerText = div.innerText;
          closeLang();
          render();
          renderMobileLang();
        };
      }
      langBox.appendChild(div);
    });
  }

  function toggleLang() {
    let open = langBox.style.display === 'block';
    langBox.style.display = open ? 'none' : 'block';
    arrow.innerText = open ? '▾' : '▴';
  }

  function closeLang() {
    langBox.style.display = 'none';
    arrow.innerText = '▾';
  }

  function toggleMobileMenu() {
    let menu = document.getElementById('mobileMenu');
    menu.classList.toggle('active');
  }

  function toggleMobileLang() {
    let langBox = document.getElementById('mobileLangBox');
    let open = langBox.style.display === 'block';
    langBox.style.display = open ? 'none' : 'block';
    document.getElementById('mobileArrow').innerText = open ? '▾' : '▴';
  }

  function renderMobileLang() {
    let mobileLangBox = document.getElementById('mobileLangBox');
    mobileLangBox.innerHTML = '';
    ['ru', 'kz', 'en'].forEach(l => {
      let div = document.createElement('div');
      div.className = 'lang-item' + (l === lang ? ' active' : '');
      div.innerText = l === 'ru' ? 'РУС' : l === 'kz' ? 'ҚАЗ' : 'ENG';
      if (l !== lang) {
        div.onclick = () => {
          lang = l;
          let mobileLang = document.getElementById('mobileLang');
          mobileLang.innerText = div.innerText;
          currentLang.innerText = div.innerText;
          closeLang();
          closeMobileLang();
          closeMobileMenu();
          render();
        };
      }
      mobileLangBox.appendChild(div);
    });
  }

  function closeMobileLang() {
    let langBox = document.getElementById('mobileLangBox');
    langBox.style.display = 'none';
    document.getElementById('mobileArrow').innerText = '▾';
  }

  function closeMobileMenu() {
    let menu = document.getElementById('mobileMenu');
    menu.classList.remove('active');
  }

  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  render();
  renderMobileLang();

  // Close language menu on document click
  document.addEventListener('click', (e) => {
    let langBox = document.getElementById('langBox');
    let lang = document.querySelector('.lang');
    if (langBox && lang && !lang.contains(e.target)) {
      closeLang();
    }
  });

  // Parallax effect - smooth scrolling without jumping
  let heroImg = document.querySelector('.hero img');
  let heroSection = document.querySelector('.hero');
  
  function updateParallax() {
    let heroRect = heroSection.getBoundingClientRect();
    let heroTop = heroRect.top;
    let heroHeight = heroRect.height;
    let viewportHeight = window.innerHeight;
    
    // Only apply parallax while hero is visible
    if (heroTop < viewportHeight && heroTop + heroHeight > 0) {
      let scrollRatio = (viewportHeight - heroTop) / (viewportHeight + heroHeight);
      let maxOffset = heroSection.offsetHeight * 0.25;
      let offset = scrollRatio * maxOffset;
      heroImg.style.transform = `translateY(${offset}px)`;
    }
  }
  
  window.addEventListener('scroll', updateParallax, { passive: true });
  updateParallax(); // Initialize on page load
</script>
